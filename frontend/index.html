<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/regsuite-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OPALX Reg Suite</title>
    <!-- Initialise dark/light class before first paint to avoid flash -->
    <script>
      (function () {
        var saved = localStorage.getItem("opalx-theme");
        if (saved !== "light") document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
