# Nginx reverse proxy configuration for OPALX Regression Suite.
# Place this file at /etc/nginx/sites-available/opalx-regsuite
# and symlink: ln -s /etc/nginx/sites-available/opalx-regsuite /etc/nginx/sites-enabled/

server {
    listen 443 ssl;
    server_name opalx-ci.example.org;  # <-- replace with your domain

    ssl_certificate     /etc/letsencrypt/live/opalx-ci.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opalx-ci.example.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) log streaming.
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          3600s;
        proxy_set_header Connection '';
        proxy_http_version          1.1;
        chunked_transfer_encoding   on;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name opalx-ci.example.org;
    return 301 https://$host$request_uri;
}
